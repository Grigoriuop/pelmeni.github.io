<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Бьющийся текст</title>
    <style>
       
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5e6e8;
            font-family: Arial, sans-serif;
        }

        .beat-text {
            font-size: 70px;
            font-weight: bold;
            color: #e63946;
            text-align: center;
            
            animation: beat 0.8s infinite ease-in-out;
            cursor: pointer;
        }

     
        @keyframes beat {
            0% { transform: scale(1); }
            30% { transform: scale(1.3); }
            50% { transform: scale(1.1); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

       
        max-width: 600px {
            .beat-text {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="beat-text">сердце бьется</div>
 
</body>
</html>
